<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" fill="none">
  <!-- Glow filter -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00cc6a"/>
    </linearGradient>
  </defs>

  <!-- Book icon -->
  <g filter="url(#glow)">
    <!-- Book spine -->
    <rect x="4" y="10" width="3" height="40" rx="1.5" fill="#00ff88"/>
    <!-- Book pages left -->
    <rect x="7" y="12" width="16" height="36" rx="1" fill="#111118" stroke="#00ff88" stroke-width="1"/>
    <!-- Book pages right -->
    <rect x="23" y="12" width="16" height="36" rx="1" fill="#111118" stroke="#00ff88" stroke-width="1.2"/>
    <!-- Lines on left page -->
    <line x1="10" y1="20" x2="20" y2="20" stroke="#00ff88" stroke-width="0.8" stroke-opacity="0.6"/>
    <line x1="10" y1="25" x2="20" y2="25" stroke="#00ff88" stroke-width="0.8" stroke-opacity="0.6"/>
    <line x1="10" y1="30" x2="20" y2="30" stroke="#00ff88" stroke-width="0.8" stroke-opacity="0.6"/>
    <line x1="10" y1="35" x2="20" y2="35" stroke="#00ff88" stroke-width="0.8" stroke-opacity="0.4"/>
    <!-- Lines on right page -->
    <line x1="26" y1="20" x2="36" y2="20" stroke="#00ff88" stroke-width="0.8" stroke-opacity="0.6"/>
    <line x1="26" y1="25" x2="36" y2="25" stroke="#00ff88" stroke-width="0.8" stroke-opacity="0.6"/>
    <line x1="26" y1="30" x2="36" y2="30" stroke="#00ff88" stroke-width="0.8" stroke-opacity="0.6"/>
    <line x1="26" y1="35" x2="36" y2="35" stroke="#00ff88" stroke-width="0.8" stroke-opacity="0.4"/>
    <!-- Crypto hex symbol on right page -->
    <text x="29" y="45" font-family="monospace" font-size="8" fill="#00ff88" fill-opacity="0.9">₿</text>
  </g>

  <!-- P2E text -->
  <text x="50" y="38" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="26" fill="#e2e2e2" letter-spacing="-1" filter="url(#glow)">P2E</text>

  <!-- BIBLE text in neon green -->
  <text x="103" y="38" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="26" fill="#00ff88" letter-spacing="-1" filter="url(#glow)">BIBLE</text>

  <!-- Tagline -->
  <text x="51" y="51" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="8.5" fill="#888899" letter-spacing="1.5">WEB3 GAMING INTELLIGENCE</text>
</svg>
