<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <filter id="g">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0a0a0f"/>
  <!-- Book spine -->
  <rect x="4" y="5" width="2.5" height="22" rx="1.2" fill="#00ff88" filter="url(#g)"/>
  <!-- Left page -->
  <rect x="6.5" y="6.5" width="9" height="19" rx="0.8" fill="#111118" stroke="#00ff88" stroke-width="0.8"/>
  <!-- Right page -->
  <rect x="15.5" y="6.5" width="10" height="19" rx="0.8" fill="#111118" stroke="#00ff88" stroke-width="1"/>
  <!-- Page lines left -->
  <line x1="8.5" y1="11" x2="14" y2="11" stroke="#00ff88" stroke-width="0.6" stroke-opacity="0.7"/>
  <line x1="8.5" y1="14" x2="14" y2="14" stroke="#00ff88" stroke-width="0.6" stroke-opacity="0.7"/>
  <line x1="8.5" y1="17" x2="14" y2="17" stroke="#00ff88" stroke-width="0.6" stroke-opacity="0.5"/>
  <line x1="8.5" y1="20" x2="14" y2="20" stroke="#00ff88" stroke-width="0.6" stroke-opacity="0.3"/>
  <!-- Page lines right -->
  <line x1="17.5" y1="11" x2="23.5" y2="11" stroke="#00ff88" stroke-width="0.6" stroke-opacity="0.7"/>
  <line x1="17.5" y1="14" x2="23.5" y2="14" stroke="#00ff88" stroke-width="0.6" stroke-opacity="0.7"/>
  <line x1="17.5" y1="17" x2="23.5" y2="17" stroke="#00ff88" stroke-width="0.6" stroke-opacity="0.5"/>
  <!-- Neon dot accent -->
  <circle cx="20.5" cy="21" r="2" fill="#00ff88" fill-opacity="0.9" filter="url(#g)"/>
</svg>
